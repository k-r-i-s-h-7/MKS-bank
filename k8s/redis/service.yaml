apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: mks-bank
  labels:
    app: redis
spec:
  selector:
    app: redis
  ports:
    - name: redis
      protocol: TCP
      port: 6379
      targetPort: 6379
  # ClusterIP — Redis is only accessed by the backend internally
  type: ClusterIP
