apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: mks-bank
  labels:
    app: backend
spec:
  selector:
    app: backend   # Routes traffic to pods with this label
  ports:
    - name: http
      protocol: TCP
      port: 9090        # Port exposed inside the cluster
      targetPort: 9090  # Port on the pod
      nodePort: 30080   # Port accessible on localhost (Docker Desktop)
  # NodePort is used for local access on Docker Desktop.
  # Access at: http://localhost:30080
  type: NodePort
