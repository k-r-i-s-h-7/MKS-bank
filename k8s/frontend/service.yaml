apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: mks-bank
  labels:
    app: frontend
spec:
  selector:
    app: frontend
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30000   # Access at: http://localhost:30000
  type: NodePort
